name: B-LOGS RSS Ingestion Loop

on:
  schedule:
    - cron: '0 */4 * * *' # Runs every 4 hours automatically
  workflow_dispatch: # Enables the gray manual click button

jobs:
  run-pipeline:
    name: Cloud Automation Instance
    runs-on: ubuntu-latest

    steps:
    - name: Step 1 - Download Repository Code
      uses: actions/checkout@v4

    - name: Step 2 - Configure Python Server Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Step 3 - Install App Packages
      run: |
        python -m pip install --upgrade pip
        pip install feedparser supabase python-dotenv beautifulsoup4 python-dateutil

    - name: Step 4 - Run Scraper Script Code
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python aggregator.py